<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#07070c">
<!--
  ============================================================
  EDIT HERE — Person 2 (CV only, no portfolio)
  1. Drop the photo at: assets/photo.jpg  (square works best)
  2. Change NAME, ROLE and the two BIO lines below (search "EDIT").
  3. IMPORTANT: replace assets/qr-open-cv.jpg and assets/qr-download-cv.jpg
     with THIS person's own QR codes (current files are placeholders).
  ============================================================
-->
<title>Your Name — Say hi 👋</title>
<style>
  :root{
    --bg:#07070c;
    --text:#f6f6f9;
    --muted:#9a9aa6;
    --accent-a:#a78bfa;
    --accent-b:#7c5cff;
    --accent-c:#22d3ee;
    --tile:#000;
    --border:rgba(255,255,255,.09);
    --gap:clamp(14px, 3.2vh, 28px);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:ui-sans-serif,-apple-system,"SF Pro Display","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    min-height:100dvh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:max(20px,env(safe-area-inset-top)) 20px max(20px,env(safe-area-inset-bottom));
    overflow:hidden;
    position:relative;
  }
  body::before,body::after{
    content:"";position:fixed;border-radius:50%;filter:blur(70px);z-index:0;pointer-events:none;
  }
  body::before{width:60vmax;height:60vmax;top:-25vmax;left:-15vmax;
    background:radial-gradient(circle,rgba(124,92,255,.28),transparent 70%);}
  body::after{width:55vmax;height:55vmax;bottom:-28vmax;right:-18vmax;
    background:radial-gradient(circle,rgba(34,211,238,.18),transparent 70%);}

  .card{
    position:relative;z-index:1;
    width:100%;max-width:420px;
    display:flex;flex-direction:column;align-items:center;
    gap:var(--gap);
    text-align:center;
  }

  .avatar{
    position:relative;
    width:clamp(96px,20vh,148px);aspect-ratio:1;border-radius:50%;
    padding:3px;
    background:linear-gradient(135deg,var(--accent-a),var(--accent-b),var(--accent-c));
    box-shadow:0 0 0 6px rgba(124,92,255,.10),0 18px 45px rgba(0,0,0,.55);
    animation:rise .7s .05s both;
  }
  .avatar img,.avatar .fallback{
    width:100%;height:100%;border-radius:50%;object-fit:cover;display:block;
    background:#14141c;
  }
  .avatar .fallback{
    position:absolute;inset:3px;width:auto;height:auto;
    display:flex;align-items:center;justify-content:center;
    font-size:clamp(28px,6vh,40px);font-weight:600;letter-spacing:1px;
    color:rgba(255,255,255,.85);
    background:radial-gradient(circle at 30% 25%,#2a2a3d,#101018);
  }
  .avatar img{position:relative;z-index:1}
  .avatar img.missing{display:none}

  .name{
    font-size:clamp(26px,4.4vh,38px);font-weight:700;letter-spacing:-.02em;line-height:1.05;
    background:linear-gradient(120deg,#fff 20%,var(--accent-a) 60%,var(--accent-c));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    animation:rise .7s .12s both;
  }
  .role{
    margin-top:6px;
    font-size:clamp(11px,1.6vh,13px);font-weight:600;letter-spacing:.22em;text-transform:uppercase;
    color:var(--accent-a);
    animation:rise .7s .16s both;
  }
  .bio{
    max-width:34ch;
    font-size:clamp(13px,1.9vh,15px);line-height:1.5;color:var(--muted);
    animation:rise .7s .2s both;
  }

  .qr-row{
    width:100%;
    display:grid;grid-template-columns:repeat(2,minmax(0,1fr));
    gap:clamp(12px,2.4vh,18px);
    animation:rise .7s .26s both;
  }
  .qr{
    appearance:none;border:1px solid var(--border);background:var(--tile);
    border-radius:16px;padding:0;overflow:hidden;cursor:pointer;
    aspect-ratio:1;position:relative;min-width:0;
    box-shadow:0 10px 30px rgba(0,0,0,.45);
    transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease;
  }
  .qr img{width:100%;height:100%;max-width:100%;object-fit:contain;display:block}
  .qr:hover,.qr:focus-visible{
    transform:translateY(-4px);
    border-color:rgba(124,92,255,.6);
    box-shadow:0 16px 40px rgba(124,92,255,.28);
    outline:none;
  }
  .qr:active{transform:translateY(-1px) scale(.99)}

  .hint{
    font-size:clamp(10px,1.4vh,12px);letter-spacing:.04em;color:rgba(255,255,255,.35);
    display:flex;align-items:center;gap:6px;
    animation:rise .7s .3s both;
  }
  .hint svg{width:14px;height:14px;opacity:.7}

  .lightbox{
    position:fixed;inset:0;z-index:50;display:none;
    align-items:center;justify-content:center;
    background:rgba(3,3,7,.82);backdrop-filter:blur(6px);
    padding:24px;
  }
  .lightbox.open{display:flex;animation:fade .2s both}
  .lightbox img{
    width:min(84vw,84vh);max-width:460px;border-radius:24px;
    box-shadow:0 30px 80px rgba(0,0,0,.7);
  }
  .lightbox .close{
    position:absolute;top:calc(18px + env(safe-area-inset-top));right:20px;
    width:44px;height:44px;border-radius:50%;border:1px solid var(--border);
    background:rgba(255,255,255,.06);color:#fff;font-size:22px;line-height:1;cursor:pointer;
  }

  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important}}
</style>
</head>
<body>
  <main class="card">
    <div class="avatar">
      <!-- EDIT: replace assets/photo.jpg with a square photo -->
      <span class="fallback">YN</span>
      <img src="assets/photo.jpg" alt="Photo" onerror="this.classList.add('missing')">
    </div>

    <div>
      <!-- EDIT: name / role -->
      <h1 class="name">Your Name</h1>
      <p class="role">Software Engineer</p>
    </div>

    <!-- EDIT: two lines about yourself -->
    <p class="bio">Building reliable systems, end to end.<br>Scan a code to open or download my CV.</p>

    <div class="qr-row">
      <button class="qr" aria-label="Open CV" onclick="zoom('assets/qr-open-cv.jpg','Open CV')">
        <img src="assets/qr-open-cv.jpg" alt="Open CV QR code">
      </button>
      <button class="qr" aria-label="Download CV" onclick="zoom('assets/qr-download-cv.jpg','Download CV')">
        <img src="assets/qr-download-cv.jpg" alt="Download CV QR code">
      </button>
    </div>

    <p class="hint">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 8V5a2 2 0 0 1 2-2h3M21 8V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3M21 16v3a2 2 0 0 1-2 2h-3"/></svg>
      Point your camera at a code — or tap to enlarge
    </p>
  </main>

  <div class="lightbox" id="lightbox" onclick="closeZoom()">
    <button class="close" aria-label="Close" onclick="closeZoom()">✕</button>
    <img id="lightbox-img" src="" alt="">
  </div>

  <script>
    var lb=document.getElementById('lightbox'),lbImg=document.getElementById('lightbox-img');
    function zoom(src,label){lbImg.src=src;lbImg.alt=label;lb.classList.add('open')}
    function closeZoom(){lb.classList.remove('open')}
    document.addEventListener('keydown',function(e){if(e.key==='Escape')closeZoom()});
  </script>
</body>
</html>
